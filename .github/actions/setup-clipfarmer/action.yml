name: Setup clipfarmer
description: Pull encrypted state, write .env, set up Python + Playwright.
inputs:
  state-key:
    description: STATE_ENCRYPTION_KEY secret value
    required: true
  dotenv:
    description: Full .env file contents, stored as a single multi-line GitHub Secret
    required: true
  install-playwright:
    description: Whether to install Playwright Chromium (slower; only needed for scanners/publisher)
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Pull state from `state` branch
      shell: bash
      env:
        STATE_ENCRYPTION_KEY: ${{ inputs.state-key }}
      run: bash deploy/state_pull.sh

    - name: Restore .env from secret
      shell: bash
      env:
        CLIPFARMER_DOTENV: ${{ inputs.dotenv }}
      run: |
        printf '%s' "$CLIPFARMER_DOTENV" > .env
        echo "wrote .env ($(wc -l < .env) lines)"

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        # Force-upgrade yt-dlp to nightly on every run.  YouTube ships SABR /
        # PO Token / n-sig changes weekly and only nightly tracks them in time.
        pip install --upgrade --pre "yt-dlp[default]"
        # bgutil-pot is the yt-dlp plugin that generates YouTube PO Tokens.
        # Needs the Node side too (set up below).
        pip install bgutil-ytdlp-pot-provider

    - name: Install ffmpeg (needed for yt-dlp to merge video+audio + for engine clip cuts)
      shell: bash
      run: |
        if ! command -v ffmpeg >/dev/null 2>&1; then
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
        fi
        ffmpeg -version | head -1

    - name: Set up Node.js 22 (for yt-dlp n-sig JS challenge + bgutil-pot)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache bgutil-pot Node provider
      uses: actions/cache@v4
      with:
        path: ~/bgutil-ytdlp-pot-provider
        key: bgutil-pot-${{ runner.os }}-v1

    - name: Build bgutil-pot Node provider
      shell: bash
      run: |
        # bgutil-pot's PO Token script lives next to the home dir at a path
        # the pip plugin auto-detects: ~/bgutil-ytdlp-pot-provider/server/build/generate_once.js
        cd ~
        if [ ! -d bgutil-ytdlp-pot-provider ]; then
          git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
        fi
        cd bgutil-ytdlp-pot-provider/server
        if [ ! -f build/generate_once.js ]; then
          npm install --no-audit --no-fund
          npx tsc
        fi
        test -f build/generate_once.js && echo "bgutil-pot script ready"

    - name: Flag downloader + override ffmpeg path for Linux runner
      shell: bash
      run: |
        # CLIPFARMER_LOCAL tells engine/downloader.py to skip the broken
        # site-driver / pytubefix / Cobalt fallback chain and go straight
        # to yt-dlp with PO Tokens + Node n-sig + mweb/web_creator clients.
        echo "CLIPFARMER_LOCAL=1" >> "$GITHUB_ENV"
        # .env (uploaded from Chris's laptop) hard-codes a Windows ffmpeg
        # path.  Override with the system ffmpeg we just apt-installed —
        # python-dotenv won't clobber a pre-set env var.
        echo "FFMPEG_PATH=/usr/bin/ffmpeg" >> "$GITHUB_ENV"

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

    - name: Install Playwright Chromium
      if: inputs.install-playwright == 'true'
      shell: bash
      run: playwright install --with-deps chromium
