name: Whop campaign scan
# Full Whop scan every 6h.  Refreshes the campaign list + viability scores.

on:
  schedule:
    - cron: '30 */6 * * *'   # 00:30, 06:30, 12:30, 18:30 UTC
  workflow_dispatch:

concurrency:
  group: clipfarmer-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-clipfarmer
        with:
          state-key: ${{ secrets.STATE_ENCRYPTION_KEY }}
          dotenv: ${{ secrets.CLIPFARMER_DOTENV }}

      - name: Run scanner
        run: python -m scanner --debug

      - name: Push state
        if: always()
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash deploy/state_push.sh
