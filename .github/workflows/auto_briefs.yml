name: Auto-extract campaign briefs
# Twice daily: pull structured rules + creative briefs for any new/missing
# campaign so the Director always has fresh material to work from.

on:
  schedule:
    - cron: '0 2,14 * * *'    # 02:00 + 14:00 UTC
  workflow_dispatch:

concurrency:
  group: clipfarmer-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  briefs:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-clipfarmer
        with:
          state-key: ${{ secrets.STATE_ENCRYPTION_KEY }}
          dotenv: ${{ secrets.CLIPFARMER_DOTENV }}

      - name: Auto-extract briefs
        run: python scripts/auto_extract_briefs.py

      - name: Push state
        if: always()
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash deploy/state_push.sh
