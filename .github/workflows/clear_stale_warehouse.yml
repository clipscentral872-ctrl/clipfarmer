name: Clear stale warehouse clips
# Manual one-shot cleanup.  Use after the system has been idle for a few
# days and the warehouse is full of clips slotted to times that already
# passed.  Resets their warehouse_state so the next producer run can fill
# the slots with fresh content.

on:
  workflow_dispatch:

concurrency:
  group: clipfarmer-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-clipfarmer
        with:
          state-key: ${{ secrets.STATE_ENCRYPTION_KEY }}
          dotenv: ${{ secrets.CLIPFARMER_DOTENV }}
          install-playwright: 'false'

      - name: Clear stale warehouse clips
        run: python scripts/clear_stale_warehouse.py

      - name: Push state
        if: always()
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash deploy/state_push.sh
