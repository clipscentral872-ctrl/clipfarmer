name: Vyro leaderboards
# Scrape each active Vyro campaign's leaderboard so the EV ranker sees current
# competitor view counts.  Every 6h, offset from other 6h jobs.

on:
  schedule:
    - cron: '20 */6 * * *'   # 00:20, 06:20, 12:20, 18:20 UTC
  workflow_dispatch:

concurrency:
  group: clipfarmer-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-clipfarmer
        with:
          state-key: ${{ secrets.STATE_ENCRYPTION_KEY }}
          dotenv: ${{ secrets.CLIPFARMER_DOTENV }}

      - name: Scrape Vyro leaderboards
        run: python scripts/scrape_vyro_leaderboards.py

      - name: Push state
        if: always()
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash deploy/state_push.sh
